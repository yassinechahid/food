  <!-- Food items on plate -->
  <circle cx="95" cy="95" r="8" fill="#4D5F7C"/>
  <circle cx="110" cy="93" r="6" fill="#4D5F7C"/>
  <circle cx="102" cy="100" r="7" fill="#4D5F7C"/>
  
  <!-- Decorative elements -->
  <path d="M 85 55 Q 100 45 115 55" stroke="#00696C" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
  <circle cx="80" cy="58" r="2.5" fill="#00696C" opacity="0.7"/>
  <circle cx="120" cy="58" r="2.5" fill="#00696C" opacity="0.7"/>
